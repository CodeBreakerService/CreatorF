<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CreatorF Pro</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --accent: #3498db;
            --border: #333;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Запрет скролла */
            position: fixed;
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        #main-menu img { width: 80px; margin-bottom: 20px; border-radius: 15px; }
        
        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .preset-btn {
            background: var(--panel-bg); border: 1px solid var(--border);
            padding: 15px; border-radius: 10px; color: white;
        }

        /* --- ИНТЕРФЕЙС РЕДАКТОРА --- */
        #editor { display: none; height: 100vh; flex-direction: column; }

        header {
            height: 50px; background: var(--panel-bg); display: flex;
            align-items: center; justify-content: space-between; padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }

        #workspace {
            flex-grow: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }

        /* Стек холстов (слои) */
        #canvas-stack { position: relative; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }
        #ui-canvas { z-index: 999; pointer-events: none; } /* Для рамки лассо */

        /* Панель инструментов (слева) */
        .toolbar {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            background: var(--panel-bg); border-radius: 10px; padding: 8px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border);
            z-index: 100;
        }

        .tool-btn {
            width: 40px; height: 40px; border-radius: 8px; border: none;
            background: transparent; color: white; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }

        .tool-btn.active { background: var(--accent); }

        /* Панель слоев (справа) */
        #layers-panel {
            position: absolute; right: 0; top: 50px; bottom: 80px; width: 120px;
            background: rgba(30, 30, 30, 0.9); border-left: 1px solid var(--border);
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
            overflow-y: auto;
        }

        .layer-item {
            background: #333; padding: 5px; border-radius: 4px; font-size: 11px;
            text-align: center; border: 2px solid transparent;
        }
        .layer-item.active { border-color: var(--accent); }

        /* Нижняя панель настроек */
        .bottom-bar {
            height: 80px; background: var(--panel-bg); border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-around; padding: 0 10px;
        }

        .control-group { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; }
        input[type="range"] { width: 100px; }
        input[type="color"] { border: none; width: 30px; height: 30px; background: none; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Главное меню -->
    <div id="main-menu">
        <img src="https://i.postimg.cc/zV6zjHBr/logo.png" alt="Logo">
        <h1 style="margin-bottom: 5px;">CreatorF</h1>
        <p style="color: #888; margin-bottom: 30px;">Профессиональный редактор без AI</p>
        
        <div class="preset-grid">
            <button class="preset-btn" onclick="initApp(1080, 1080)">Квадрат<br><small>1080x1080</small></button>
            <button class="preset-btn" onclick="initApp(1080, 1920)">Сторис<br><small>1080x1920</small></button>
            <button class="preset-btn" onclick="initApp(1920, 1080)">HD Видео<br><small>1920x1080</small></button>
            <button class="preset-btn" onclick="customPrompt()">Свой размер</button>
        </div>
    </div>

    <!-- Редактор -->
    <div id="editor">
        <header>
            <div style="font-weight: bold; color: var(--accent);">CreatorF</div>
            <div style="display: flex; gap: 10px;">
                <label style="background: #444; padding: 5px 10px; border-radius: 5px; font-size: 12px;">
                    + Фото <input type="file" id="import-img" class="hidden" accept="image/*">
                </label>
                <button onclick="saveImage()" style="background: var(--accent); border: none; color: white; padding: 5px 15px; border-radius: 5px;">Сохранить</button>
            </div>
        </header>

        <div id="workspace">
            <div class="toolbar">
                <button class="tool-btn active" onclick="setTool('brush', this)">🖌️</button>
                <button class="tool-btn" onclick="setTool('eraser', this)">🧽</button>
                <button class="tool-btn" onclick="setTool('rect', this)">⬜</button>
                <button class="tool-btn" onclick="setTool('line', this)">📏</button>
                <button class="tool-btn" onclick="setTool('lasso', this)">✂️</button>
            </div>

            <div id="canvas-stack">
                <!-- Кавасы слоев будут тут -->
                <canvas id="ui-canvas"></canvas>
            </div>

            <div id="layers-panel">
                <button onclick="addLayer()" style="background: var(--accent); border: none; color: white; border-radius: 4px; padding: 5px; margin-bottom: 10px;">+ Слои</button>
                <div id="layers-list"></div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="control-group">
                <span>Цвет</span>
                <input type="color" id="colorPicker" value="#000000">
            </div>
            <div class="control-group">
                <span>Размер: <b id="val-size">5</b></span>
                <input type="range" id="sizePicker" min="1" max="100" value="5">
            </div>
            <div class="control-group">
                <span>Прозрачность: <b id="val-alpha">100</b></span>
                <input type="range" id="alphaPicker" min="1" max="100" value="100">
            </div>
        </div>
    </div>

    <script>
        let canvases = [];
        let activeIndex = 0;
        let ctx, uiCtx;
        let isDrawing = false;
        let currentTool = 'brush';
        let startX, startY;
        let lassoPoints = [];

        const stack = document.getElementById('canvas-stack');
        const layersList = document.getElementById('layers-list');
        const uiCanvas = document.getElementById('ui-canvas');

        function initApp(w, h) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('editor').style.display = 'flex';
            
            // Настройка размеров контейнера под экран
            const scale = Math.min((window.innerWidth - 150) / w, (window.innerHeight - 150) / h);
            stack.style.width = (w * scale) + 'px';
            stack.style.height = (h * scale) + 'px';
            
            uiCanvas.width = w; uiCanvas.height = h;
            uiCanvas.style.width = "100%"; uiCanvas.style.height = "100%";
            uiCtx = uiCanvas.getContext('2d');

            addLayer(w, h);
        }

        function addLayer(w = uiCanvas.width, h = uiCanvas.height) {
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.style.width = "100%"; c.style.height = "100%";
            c.dataset.id = canvases.length;
            
            stack.insertBefore(c, uiCanvas);
            canvases.push(c);
            selectLayer(canvases.length - 1);
            renderLayerList();
        }

        function selectLayer(index) {
            activeIndex = index;
            ctx = canvases[activeIndex].getContext('2d');
            renderLayerList();
        }

        function renderLayerList() {
            layersList.innerHTML = '';
            [...canvases].reverse().forEach((c, i) => {
                const realIdx = canvases.length - 1 - i;
                const div = document.createElement('div');
                div.className = `layer-item ${realIdx === activeIndex ? 'active' : ''}`;
                div.innerHTML = `Слой ${realIdx + 1}`;
                div.onclick = () => selectLayer(realIdx);
                layersList.appendChild(div);
            });
        }

        function setTool(tool, el) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // Рисование
        function getCoords(e) {
            const rect = canvases[0].getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const scaleX = canvases[0].width / rect.width;
            const scaleY = canvases[0].height / rect.height;
            return [(clientX - rect.left) * scaleX, (clientY - rect.top) * scaleY];
        }

        function start(e) {
            isDrawing = true;
            [startX, startY] = getCoords(e);
            ctx.beginPath();
            ctx.strokeStyle = document.getElementById('colorPicker').value;
            ctx.lineWidth = document.getElementById('sizePicker').value;
            ctx.globalAlpha = document.getElementById('alphaPicker').value / 100;
            
            if (currentTool === 'eraser') ctx.globalCompositeOperation = 'destination-out';
            else ctx.globalCompositeOperation = 'source-over';
            
            if (currentTool === 'lasso') lassoPoints = [[startX, startY]];
        }

        function move(e) {
            if (!isDrawing) return;
            const [x, y] = getCoords(e);

            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'lasso') {
                uiCtx.clearRect(0,0, uiCanvas.width, uiCanvas.height);
                lassoPoints.push([x, y]);
                uiCtx.beginPath();
                uiCtx.setLineDash([5, 5]);
                uiCtx.moveTo(lassoPoints[0][0], lassoPoints[0][1]);
                lassoPoints.forEach(p => uiCtx.lineTo(p[0], p[1]));
                uiCtx.stroke();
            } else {
                uiCtx.clearRect(0,0, uiCanvas.width, uiCanvas.height);
                uiCtx.setLineDash([]);
                uiCtx.strokeRect(startX, startY, x - startX, y - startY);
            }
        }

        function end(e) {
            if (!isDrawing) return;
            const [x, y] = getCoords(e);
            uiCtx.clearRect(0,0, uiCanvas.width, uiCanvas.height);

            if (currentTool === 'rect') {
                ctx.strokeRect(startX, startY, x - startX, y - startY);
            } else if (currentTool === 'line') {
                ctx.moveTo(startX, startY);
                ctx.lineTo(x, y);
                ctx.stroke();
            } else if (currentTool === 'lasso') {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(lassoPoints[0][0], lassoPoints[0][1]);
                lassoPoints.forEach(p => ctx.lineTo(p[0], p[1]));
                ctx.closePath();
                ctx.clip();
                // Тут можно было бы сделать заливку или фильтр, 
                // но пока просто визуально ограничиваем область
                ctx.restore();
            }
            isDrawing = false;
        }

        // Импорт фото
        document.getElementById('import-img').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, uiCanvas.width, uiCanvas.height);
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        // Сохранение
        function saveImage() {
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = uiCanvas.width;
            finalCanvas.height = uiCanvas.height;
            const fCtx = finalCanvas.getContext('2d');
            fCtx.fillStyle = "white"; fCtx.fillRect(0,0,finalCanvas.width, finalCanvas.height);
            
            canvases.forEach(c => fCtx.drawImage(c, 0, 0));
            
            const link = document.createElement('a');
            link.download = 'CreatorF_Project.png';
            link.href = finalCanvas.toDataURL();
            link.click();
        }

        function customPrompt() {
            const w = prompt("Ширина:", 1080);
            const h = prompt("Высота:", 1080);
            if (w && h) initApp(w, h);
        }

        // Слушатели событий
        window.addEventListener('mousedown', (e) => { if(e.target.tagName === 'CANVAS') start(e) });
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchstart', (e) => { if(e.target.tagName === 'CANVAS') start(e) }, {passive: false});
        window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e) }, {passive: false});
        window.addEventListener('touchend', end);

        // Обновление цифр в интерфейсе
        document.getElementById('sizePicker').oninput = function() { document.getElementById('val-size').innerText = this.value; };
        document.getElementById('alphaPicker').oninput = function() { document.getElementById('val-alpha').innerText = this.value; };

    </script>
</body>
</html>
