<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CreatorF - Классический Редактор</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-color: #0078d4;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка с логотипом */
        header {
            background-color: var(--panel-color);
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #444;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-container img {
            height: 30px;
            border-radius: 4px;
        }

        .app-name {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Холст */
        #canvas-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-image: 
                linear-gradient(45deg, #222 25%, transparent 25%),
                linear-gradient(-45deg, #222 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #222 75%),
                linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        canvas {
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            touch-action: none;
        }

        /* Панель инструментов (снизу для удобства пальцев) */
        .toolbar {
            background-color: var(--panel-color);
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            border-top: 1px solid #444;
        }

        .tool {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            gap: 5px;
            background: none;
            border: none;
            color: white;
            opacity: 0.7;
        }

        .tool.active {
            opacity: 1;
            color: var(--accent-color);
        }

        .tool-icon {
            width: 24px;
            height: 24px;
            background-color: #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool.active .tool-icon {
            background-color: var(--accent-color);
        }

        /* Настройки инструмента */
        .settings-bar {
            background-color: #333;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 12px;
        }

        input[type="range"] {
            width: 80px;
        }

        .color-picker {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
            padding: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Ссылка на ваш логотип -->
            <img src="https://i.postimg.cc/zV6zjHBr/logo.png" alt="CreatorF Logo" onerror="this.src='https://via.placeholder.com/30?text=CF'">
            <span class="app-name">CreatorF</span>
        </div>
        <button onclick="clearCanvas()" style="background: none; border: 1px solid #666; color: white; border-radius: 4px; padding: 4px 10px;">Сброс</button>
    </header>

    <div class="settings-bar">
        <span>Размер: <input type="range" id="size" min="1" max="50" value="5"></span>
        <span>Цвет: <input type="color" id="color" class="color-picker" value="#000000"></span>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="toolbar">
        <button class="tool active" onclick="setTool('brush', this)">
            <div class="tool-icon">🖌️</div>
            Кисть
        </button>
        <button class="tool" onclick="setTool('eraser', this)">
            <div class="tool-icon">🧽</div>
            Ластик
        </button>
        <button class="tool" onclick="setTool('square', this)">
            <div class="tool-icon">⬜</div>
            Квадрат
        </button>
        <button class="tool" onclick="setTool('circle', this)">
            <div class="tool-icon">⭕</div>
            Круг
        </button>
        <button class="tool" onclick="downloadImage()">
            <div class="tool-icon">💾</div>
            Сохранить
        </button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color');
        const sizePicker = document.getElementById('size');
        
        let painting = false;
        let currentTool = 'brush';

        // Настройка размера холста под мобильный экран
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth - 40;
            canvas.height = container.clientHeight - 40;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Функции рисования
        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            
            // Поддержка и мыши, и тачскрина
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = sizePicker.value;
            
            if (currentTool === 'eraser') {
                ctx.strokeStyle = 'white';
                ctx.globalCompositeOperation = 'destination-out'; // Честное стирание
            } else {
                ctx.strokeStyle = colorPicker.value;
                ctx.globalCompositeOperation = 'source-over';
            }

            if (currentTool === 'brush' || currentTool === 'eraser') {
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            } else if (currentTool === 'square') {
                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(x - ctx.lineWidth/2, y - ctx.lineWidth/2, ctx.lineWidth * 2, ctx.lineWidth * 2);
            } else if (currentTool === 'circle') {
                ctx.fillStyle = colorPicker.value;
                ctx.beginPath();
                ctx.arc(x, y, ctx.lineWidth, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Выбор инструмента
        function setTool(tool, element) {
            currentTool = tool;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }

        // Очистка
        function clearCanvas() {
            if(confirm('Очистить весь холст?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Сохранение (скачивание картинки)
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'CreatorF-Masterpiece.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Слушатели событий
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    </script>
</body>
  </html>
